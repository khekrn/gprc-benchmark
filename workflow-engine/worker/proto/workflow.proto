syntax = "proto3";

package workflow.v1;

option go_package = "./proto";

// Core workflow execution request
message WorkflowExecutionRequest {
  string workflow_name = 1;
  string request_id = 2;
  string payload = 3; // JSON payload
}

// Response acknowledging workflow execution started
message WorkflowExecutionResponse {
  bool success = 1;
  string message = 2;
  int64 workflow_id = 3;
}

// State update sent from worker to server
message StateUpdateRequest {
  int64 workflow_id = 1;
  string state_name = 2;
  string state_type = 3; // "task" or "condition"
  string status = 4; // "pending", "success", "failed"
  string data = 5; // JSON data for variables
}

// Workflow completion sent from worker to server
message WorkflowCompleteRequest {
  int64 workflow_id = 1;
  string status = 2; // "success" or "failed"
  string variables = 3; // Final variables as JSON
}

// Health check for workers
message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string message = 2;
  map<string, string> metadata = 3;
}

// Server-to-Worker messages (server sends these to worker)
message ServerToWorkerMessage {
  oneof message_type {
    WorkflowExecutionRequest execution_request = 1;
  }
}

// Worker-to-Server messages (worker sends these to server)
message WorkerToServerMessage {
  oneof message_type {
    WorkflowExecutionResponse execution_response = 1;
    StateUpdateRequest state_update = 2;
    WorkflowCompleteRequest workflow_complete = 3;
  }
}

// Worker service - implemented by workers
service WorkerService {
  // Health check endpoint
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // Bidirectional streaming: Server connects to worker and they exchange messages
  rpc WorkflowStream(stream ServerToWorkerMessage) returns (stream WorkerToServerMessage);
}
